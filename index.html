<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://chaotics-lab.github.io/img/logos/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://chaotics-lab.github.io/img/logos/Chaotics White Black Bg.jpg" />

    <!-- visitor analytics -->
    <script defer src="/scripts/analytics-loader.js"></script>
   
    <!-- Primary Meta Tags -->
    <title>Chaotics Lab | Creative Developer Portfolio</title>
    <meta name="title" content="Chaotics Lab | Project Portfolio" />
    <meta name="description" content="First came Chaos, vast and formless. Explore my portfolio of innovative web experiences, interactive projects, and creative coding experiments." />
    <meta name="author" content="Chaotics Lab" />
    <meta name="keywords" content="portfolio, web developer, creative coding, interactive design, web development, full stack developer" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://chaotics-lab.github.io/" />
   
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chaotics-lab.github.io/" />
    <meta property="og:site_name" content="Chaotics Lab" />
    <meta property="og:title" content="Chaotics Lab | Project Portfolio" />
    <meta property="og:description" content="First came Chaos, vast and formless. Explore my portfolio of innovative web experiences, interactive projects, and creative coding experiments." />
    <meta property="og:image" content="https://chaotics-lab.github.io/img/logos/Chaotics White Black Bg.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Chaotics Lab Logo" />
    <meta property="og:locale" content="en_US" />
   
    <!-- X (Twitter) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://chaotics-lab.github.io/" />
    <meta name="twitter:title" content="Chaotics Lab | Project Portfolio" />
    <meta name="twitter:description" content="First came Chaos, vast and formless. Explore my portfolio of innovative web experiences, interactive projects, and creative coding experiments." />
    <meta name="twitter:image" content="https://chaotics-lab.github.io/img/logos/Chaotics White Black Bg.jpg" />
    <meta name="twitter:image:alt" content="Chaotics Lab Logo" />
    <meta name="twitter:creator" content="@chaoticslab" />
    <meta name="twitter:site" content="@chaoticslab" />
    
    <!-- Additional Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Google Fonts (centralized list — edit src/config/fonts.ts to change) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Serif+Display&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600;700&family=Sora:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Chaotics Lab",
      "url": "https://chaotics-lab.github.io/",
      "image": "https://chaotics-lab.github.io/img/logos/Chaotics White Black Bg.jpg",
      "jobTitle": "Creative Developer",
      "description": "First came Chaos, vast and formless. Creative developer specializing in innovative web experiences and interactive design.",
      "sameAs": [
        "https://github.com/chaotics-lab"
      ]
    }
    </script>

    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function () {
        const r = new URLSearchParams(window.location.search).get("r");
        if (r) {
          window.history.replaceState(null, "", decodeURIComponent(r));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
