<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the full path into a query param and sends it to index.html
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const redirect = path + search + hash;
      window.location.replace("/?r=" + encodeURIComponent(redirect));
    </script>
  </head>
  <body></body>
</html>
